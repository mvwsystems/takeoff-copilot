[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[functions]
  node_bundler = "esbuild"
  # mupdf must stay external: its WASM loader uses top-level await, which
  # esbuild cannot inline. included_files ships the actual module files.
  external_node_modules = ["mupdf"]
  included_files = ["node_modules/mupdf/**", "server/prompts/**"]

[[edge_functions]]
  path = "/api/upload"
  function = "upload"

[[edge_functions]]
  path = "/api/analyze"
  function = "analyze"

[[edge_functions]]
  path = "/api/get-upload-url"
  function = "get-upload-url"

[[edge_functions]]
  path = "/api/confirm-upload"
  function = "confirm-upload"

[[edge_functions]]
  path = "/api/start-analysis"
  function = "start-analysis"

[[edge_functions]]
  path = "/api/doc-upload"
  function = "doc-upload"

[[edge_functions]]
  path = "/api/delete-project"
  function = "delete-project"

[[edge_functions]]
  path = "/api/create-checkout"
  function = "create-checkout"

[[edge_functions]]
  path = "/api/diag-model"
  function = "diag-model"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
