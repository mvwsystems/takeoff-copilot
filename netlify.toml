[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[functions]
  included_files = ["node_modules/mupdf/**"]

[[edge_functions]]
  path = "/api/upload"
  function = "upload"

[[edge_functions]]
  path = "/api/analyze"
  function = "analyze"

[[edge_functions]]
  path = "/api/get-upload-url"
  function = "get-upload-url"

[[edge_functions]]
  path = "/api/confirm-upload"
  function = "confirm-upload"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
